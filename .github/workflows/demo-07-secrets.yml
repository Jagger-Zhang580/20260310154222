name: Demo 7 - Secrets & Variables

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  secrets-demo:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Display Non-Secret Variables
      run: |
        echo "=========================================="
        echo "🔐 Secrets Demo"
        echo "=========================================="
        echo "Repository: ${{ github.repository }}"
        echo "Owner: ${{ github.repository_owner }}"
        echo "Run Number: ${{ github.run_number }}"
        echo "=========================================="
    
    - name: Use GitHub Secrets (Simulated)
      # 注意: 永远不要在日志中打印敏感信息
      # 这里只是演示如何引用 secrets
      run: |
        echo "=========================================="
        echo "🔑 Using GitHub Secrets"
        echo "=========================================="
        echo "API Key exists: ${{ secrets.API_KEY != '' }}"
        echo "Database URL exists: ${{ secrets.DB_CONNECTION != '' }}"
        
        # 安全使用 secrets 的示例
        if [ -n "${{ secrets.API_KEY }}" ]; then
          echo "✅ API_KEY is configured"
        else
          echo "⚠️  API_KEY is not set"
        fi
        echo "=========================================="
    
    - name: Simulate Secure API Call
      run: |
        echo "=========================================="
        echo "🌐 Simulating Secure API Call"
        echo "=========================================="
        echo "Connecting to API endpoint..."
        echo "Authentication: Bearer *** (hidden)"
        echo "Response: 200 OK"
        echo "✅ Secrets demo passed!"
        echo "=========================================="

  # 演示如何在不同 job 之间传递数据
  second-job:
    needs: secrets-demo
    runs-on: ubuntu-latest
    
    steps:
    - name: Continue Workflow
      run: |
        echo "=========================================="
        echo "🔗 Multi-Job Workflow"
        echo "=========================================="
        echo "Previous job completed successfully!"
        echo "Continuing with next steps..."
        echo "✅ Multi-job demo passed!"
        echo "=========================================="
